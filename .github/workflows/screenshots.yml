name: Screenshots

# Visual pass for the immersive UI. Runs on demand and on PRs; uploads the
# rendered screenshots as an artifact so the redesign can be eyeballed. Kept
# separate from Test/Build/Deploy so it never gates a release, and so it does
# not add Playwright to the app's dependency install.
on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  screenshots:
    name: Render screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Install Playwright (+ Chromium)
        run: |
          npm i --no-save @playwright/test@1.60.0
          npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Render screenshots
        run: npx playwright test

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redesign-screenshots
          path: e2e/.shots/
          if-no-files-found: warn
